services:
  miako-backend:
    build: .
    image: miako
    container_name: miako-backend-container
    ports:
      - "8000:8000"

    env_file:
      - .env
    depends_on:
      miako-database:
        condition: service_healthy
    networks:
      - miako-network

  miako-database:
    image: postgres:15-alpine
    container_name: miako-database-container
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
    ports:
      - "5432:5432"
    volumes:
      - miako-data-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - miako-network
    # No ports exposed to host for security

volumes:
  miako-data-volume:

networks:
  miako-network:
    driver: bridge
