version: '3.8'

services:
  my-app:
    build: .
    image: miako-mvp-app:0.1
    container_name: miako-mvp-app-running
    #restart: unless-stopped
    ports:
      - "8000:8000"

    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - miako-network

  db:
    image: postgres:15-alpine
    container_name: miako-postgres-db
    restart: unless-stopped
    # Postgres also needs credentials from the .env file
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - miako-network
    # No ports exposed to host for security

volumes:
  postgres_data:

networks:
  miako-network:
    driver: bridge
